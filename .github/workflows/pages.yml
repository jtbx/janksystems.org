name: Deploy site

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install Hugo
        run: |
          wget https://github.com/gohugoio/hugo/releases/download/v0.159.0/hugo_0.159.0_linux-amd64.deb
          sudo apt install -y ./hugo_0.159.0_linux-amd64.deb

      - name: Build site
        run: |
          hugo build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: www.janksystems.org
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
